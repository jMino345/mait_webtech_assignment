<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Knowledge Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Custom Animations */
        .option-card {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-card:hover {
            transform: scale(1.03);
        }

        .selected {
            border: 2px solid #0d6efd;
            background-color: #e7f1ff;
        }

        .correct {
            background-color: #198754 !important;
            color: white !important;
        }

        .incorrect {
            background-color: #dc3545 !important;
            color: white !important;
        }

        #feedback {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        #feedback.show {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-light">

<header class="bg-primary text-white text-center py-4 shadow">
    <h1 class="fw-bold">🎓 College Knowledge Quiz</h1>
</header>

<div class="container my-5">

    <!-- Admin Panel -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Admin Panel</h5>
            <div class="input-group">
                <input type="password" id="adminPass" class="form-control" placeholder="Enter Admin Password">
                <button class="btn btn-dark" onclick="adminLogin()">Login</button>
            </div>
            <div id="adminControls" class="mt-3 d-none">
                <button class="btn btn-success" onclick="addQuestion()">Add Question (Demo)</button>
            </div>
        </div>
    </div>

    <!-- Quiz Section -->
    <div id="quiz-section" class="card shadow">
        <div class="card-body">

            <!-- Progress Bar -->
            <div class="progress mb-3">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
                     role="progressbar" style="width: 0%"></div>
            </div>

            <!-- Timer -->
            <div class="alert alert-warning text-center">
                ⏳ Time Left: <strong><span id="time">15</span></strong> seconds
            </div>

            <!-- Question -->
            <h4 id="question" class="mb-4"></h4>

            <!-- Options -->
            <div id="options" class="row g-3"></div>

            <!-- Submit Button -->
            <div class="text-center mt-4">
                <button id="submitBtn" class="btn btn-primary px-4">Submit Answer</button>
            </div>

            <!-- Feedback -->
            <div id="feedback" class="mt-3 text-center fw-bold"></div>
        </div>
    </div>

    <!-- Result Section -->
    <div id="result-section" class="card shadow mt-4 d-none">
        <div class="card-body text-center">
            <h3>Your Final Score</h3>
            <p id="finalScore" class="fs-4 fw-bold"></p>
            <button class="btn btn-success" onclick="restartQuiz()">Retake Quiz</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
